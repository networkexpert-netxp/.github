name: Suggest an improvement
projects: ["networkexpert-netxp/2"]
description: Share an idea or a need
title: "[Idea]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: need
    attributes:
      label: What would you like to improve?
      description: Describe the problem or desired outcome in your own words.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Add examples, links, or constraints if useful.
